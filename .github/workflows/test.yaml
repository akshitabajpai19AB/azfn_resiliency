## Source Job: https://jenkins.albertsons.com/job/esfn/job/azfn-fnapp-create/
name: ESFN-azfn-fnapp-create-test

on:
  workflow_dispatch:
    inputs:
      tf_resource_json:
        description: 'Please provide input in json format'
        required: true

permissions:
  contents: read

env:
  TF_DIR: linux
  TFLINT_VERSION: v0.50.3

jobs:
  #####################################################################
  # ➕ Prep job to build dynamic matrix from JSON regions keys
  #####################################################################
  prep:
    runs-on: [ self-hosted, windows ]
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      environment: ${{ steps.mk.outputs.environment }}
      appcode: ${{ steps.mk.outputs.appcode }}
      appname: ${{ steps.mk.outputs.appname }}

    steps:
      - name: Code check out
        uses: actions/checkout@v4

      - name: Validate tooling (terraform)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Get-Command terraform -ErrorAction SilentlyContinue)) {
            throw "terraform not found on runner"
          }

          terraform version

      - name: Write input file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $path = Join-Path $env:GITHUB_WORKSPACE "input.json"
          $content = @"
${{ github.event.inputs.tf_resource_json }}
"@

          Set-Content -Path $path -Value $content -Encoding utf8

          Write-Host "Input payload:"
          Get-Content -Path $path -Raw

      - name: Build matrix from JSON (no jq)
        id: mk
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $jsonPath = Join-Path $env:GITHUB_WORKSPACE "input.json"
          $payload = Get-Content -Path $jsonPath -Raw | ConvertFrom-Json

          $environment = $payload.environment
          $appcode     = $payload.appcode
          $appname     = $payload.appname

          if (-not $payload.regions) {
            throw "Input JSON must contain a 'regions' object"
          }

          # region keys from .regions (map/object)
          $regions = @($payload.regions.PSObject.Properties.Name)

          if ($regions.Count -eq 0) {
            throw "No regions found under input JSON .regions"
          }

          # matrix = {"region":["westus2","eastus",...]}
          $matrixObj = @{ region = $regions }
          $matrix = ($matrixObj | ConvertTo-Json -Compress)

          "environment=$environment" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "appcode=$appcode"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "appname=$appname"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "matrix=$matrix"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host "MATRIX=$matrix"


  #####################################################################
  # ✅ Matrix job – one region = one terraform run = one state
  #####################################################################
  azfnapp-TF-Init:
    runs-on: [ self-hosted, windows ]
    needs: [ prep ]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prep.outputs.matrix) }}

    steps:
      - name: Code check out
        uses: actions/checkout@v4

      - name: Validate tooling (terraform)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Get-Command terraform -ErrorAction SilentlyContinue)) {
            throw "terraform not found on runner"
          }

          terraform version

      - name: Write input file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $path = Join-Path $env:GITHUB_WORKSPACE "input.json"
          $content = @"
${{ github.event.inputs.tf_resource_json }}
"@

          Set-Content -Path $path -Value $content -Encoding utf8

      # These secrets are assumed to be JSON already
      - name: Write nonprod az sp to file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $path = Join-Path $env:GITHUB_WORKSPACE "secrets.auto.tfvars_nonprod.json"
          $content = @"
${{ secrets.AZ_SP_ESCO_NONPROD }}
"@
          Set-Content -Path $path -Value $content -Encoding utf8

      - name: Write nonprod backend to file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $path = Join-Path $env:GITHUB_WORKSPACE "backend_nonprod.json"
          $content = @"
${{ secrets.AZ_BACKEND_ESCO_NONPROD }}
"@
          Set-Content -Path $path -Value $content -Encoding utf8

      - name: Write prod az sp to file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $path = Join-Path $env:GITHUB_WORKSPACE "secrets.auto.tfvars_prod.json"
          $content = @"
${{ secrets.AZ_SP_ESCO_PROD }}
"@
          Set-Content -Path $path -Value $content -Encoding utf8

      - name: Write prod backend to file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $path = Join-Path $env:GITHUB_WORKSPACE "backend_prod.json"
          $content = @"
${{ secrets.AZ_BACKEND_ESCO_PROD }}
"@
          Set-Content -Path $path -Value $content -Encoding utf8

      #####################################################################
      # ➕ Create region-scoped tfvars JSON (ONE region per job) - no jq
      #####################################################################
      - name: Create region-scoped variables file (no jq)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $region  = "${{ matrix.region }}"
          Write-Host "Deploying region: $region"

          $inPath  = Join-Path $env:GITHUB_WORKSPACE "input.json"
          $outPath = Join-Path $env:GITHUB_WORKSPACE "region.json"

          $payload = Get-Content -Path $inPath -Raw | ConvertFrom-Json

          if (-not $payload.regions.$region) {
            throw "Region '$region' not found under .regions"
          }

          $oneRegion = $payload.regions.$region

          # Replace regions with a single-entry object
          $payload.regions = New-Object PSObject
          $payload.regions | Add-Member -NotePropertyName $region -NotePropertyValue $oneRegion

          ($payload | ConvertTo-Json -Depth 50) | Set-Content -Path $outPath -Encoding utf8

          Write-Host "Region payload:"
          Get-Content -Path $outPath -Raw

      #####################################################################
      # ➕ Install TFLint + run it (before plan) - Windows compatible
      #####################################################################
      - name: Install TFLint (Windows)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $binDir = Join-Path $env:GITHUB_WORKSPACE "bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          $zipName = "tflint_windows_amd64.zip"
          $url = "https://github.com/terraform-linters/tflint/releases/download/${{ env.TFLINT_VERSION }}/$zipName"
          $zipPath = Join-Path $binDir $zipName

          Write-Host "Downloading: $url"
          Invoke-WebRequest -Uri $url -OutFile $zipPath

          Expand-Archive -Path $zipPath -DestinationPath $binDir -Force

          $tflintExe = Join-Path $binDir "tflint.exe"
          if (-not (Test-Path $tflintExe)) {
            throw "tflint.exe not found after extracting $zipName"
          }

          # Add to PATH for next steps
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

          & $tflintExe --version

      - name: Run TFLint (linux/)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $tfDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.TF_DIR }}"
          if (-not (Test-Path $tfDir)) {
            throw "TF_DIR folder not found: $tfDir"
          }

          Set-Location $tfDir

          if (Test-Path ".tflint.hcl") {
            tflint --init
          }

          tflint

      #####################################################################
      # ✅ terraform init (state key per functionapp)
      #####################################################################
      - name: terraform init (per region state)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $region = "${{ matrix.region }}"

          $regionJsonPath = Join-Path $env:GITHUB_WORKSPACE "region.json"
          $payload = Get-Content -Path $regionJsonPath -Raw | ConvertFrom-Json

          $environment = $payload.environment
          $appcode     = $payload.appcode
          $appname     = $payload.appname
          $funcname    = $payload.regions.$region.function_app_name

          if (-not $funcname) {
            throw "function_app_name not found for region '$region' in region.json"
          }

          $tfDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.TF_DIR }}"

          # Move files into TF working directory (linux/)
          Move-Item -Path $regionJsonPath -Destination (Join-Path $tfDir "variables.auto.tfvars.json") -Force
          Move-Item -Path (Join-Path $env:GITHUB_WORKSPACE "backend_$environment.json") -Destination (Join-Path $tfDir "backend.json") -Force
          Move-Item -Path (Join-Path $env:GITHUB_WORKSPACE "secrets.auto.tfvars_$environment.json") -Destination (Join-Path $tfDir "secrets.auto.tfvars.json") -Force

          Set-Location $tfDir

          Write-Host "Auto tfvars:"
          Get-Content -Path (Join-Path $tfDir "variables.auto.tfvars.json") -Raw

          $stateKey = "esfn/$environment/$appcode/$appname/azfnapp/$region/$funcname/terraform.tfstate"
          Write-Host "Terraform state key: $stateKey"

          terraform init -input=false `
            -backend-config="backend.json" `
            -backend-config="key=$stateKey"

      - name: terraform plan
        continue-on-error: true
        id: plan
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $tfDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.TF_DIR }}"
          Set-Location $tfDir

          # Write plan output to file while keeping exit code meaningful
          terraform plan -input=false -out=tfplan 2>&1 | Tee-Object -FilePath "tf-file.plan"

      - name: terraform apply
        continue-on-error: true
        id: apply
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $tfDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.TF_DIR }}"
          Set-Location $tfDir

          Get-ChildItem -Force

          terraform apply -auto-approve -input=false tfplan
