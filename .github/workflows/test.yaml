## Equivalent of your pipeline for GitHub-hosted runner (ubuntu-latest)
## Deploys to Azure using azure/login (service principal secret)
name: azfn-linux-resiliency-deploy

on:
  workflow_dispatch:
    inputs:
      tf_resource_json:
        description: 'Please provide input in json format'
        required: true
      do_apply:
        description: 'Set true to run terraform apply (default: false)'
        required: false
        default: "false"

permissions:
  contents: read

env:
  TF_DIR: infrastructure/azure-functions-resiliency/linux
  TF_VERSION: "1.6.6"
  # Avoid noisy CLI outputs in logs (recommended by Azure Login docs)
  AZURE_CORE_OUTPUT: none

jobs:
  #####################################################################
  # Prep job: Build dynamic matrix from input.json (.regions keys)
  #####################################################################
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      environment: ${{ steps.mk.outputs.environment }}
      appcode: ${{ steps.mk.outputs.appcode }}
      appname: ${{ steps.mk.outputs.appname }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Write input file
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ github.workspace }}/input.json" << 'EOF'
          ${{ github.event.inputs.tf_resource_json }}
          EOF
          echo "Input payload:"
          cat "${{ github.workspace }}/input.json"

      - name: Build matrix from JSON
        id: mk
        shell: bash
        run: |
          set -euo pipefail

          ENVIRONMENT="$(jq -r '.environment' "${{ github.workspace }}/input.json")"
          APPCODE="$(jq -r '.appcode' "${{ github.workspace }}/input.json")"
          APPNAME="$(jq -r '.appname' "${{ github.workspace }}/input.json")"

          MATRIX="$(jq -c '{region: (.regions | keys)}' "${{ github.workspace }}/input.json")"

          echo "environment=${ENVIRONMENT}" >> "${GITHUB_OUTPUT}"
          echo "appcode=${APPCODE}" >> "${GITHUB_OUTPUT}"
          echo "appname=${APPNAME}" >> "${GITHUB_OUTPUT}"
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

          echo "MATRIX=${MATRIX}"


  #####################################################################
  # Matrix job: one region = one terraform run = one state key
  #####################################################################
  azfnapp:
    runs-on: ubuntu-latest
    needs: [ prep ]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prep.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      #####################################################################
      # ✅ FIX: Install Terraform BEFORE validating/running it
      #####################################################################
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Verify Terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform version

      #####################################################################
      # Azure Login (Service Principal secret)
      # Azure Login action supports creds JSON secret
      #####################################################################
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Export ARM_* env vars for Terraform from AZURE_CREDENTIALS
        shell: bash
        run: |
          set -euo pipefail
          # Parse the AZURE_CREDENTIALS JSON and export standard ARM_* env vars
          echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '
            "ARM_CLIENT_ID=" + .clientId,
            "ARM_CLIENT_SECRET=" + .clientSecret,
            "ARM_SUBSCRIPTION_ID=" + .subscriptionId,
            "ARM_TENANT_ID=" + .tenantId
          ' >> "${GITHUB_ENV}"

      #####################################################################
      # Write input + backend + secrets files (no albertsons actions)
      #####################################################################
      - name: Write input file
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ github.workspace }}/input.json" << 'EOF'
          ${{ github.event.inputs.tf_resource_json }}
          EOF

      - name: Write nonprod SP tfvars (optional)
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ github.workspace }}/secrets.auto.tfvars_nonprod.json" << 'EOF'
          ${{ secrets.AZ_SP_ESCO_NONPROD }}
          EOF

      - name: Write nonprod backend
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ github.workspace }}/backend_nonprod.json" << 'EOF'
          ${{ secrets.AZ_BACKEND_ESCO_NONPROD }}
          EOF

      - name: Write prod SP tfvars (optional)
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ github.workspace }}/secrets.auto.tfvars_prod.json" << 'EOF'
          ${{ secrets.AZ_SP_ESCO_PROD }}
          EOF

      - name: Write prod backend
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ github.workspace }}/backend_prod.json" << 'EOF'
          ${{ secrets.AZ_BACKEND_ESCO_PROD }}
          EOF

      #####################################################################
      # Create region-scoped JSON payload (ONE region per job)
      #####################################################################
      - name: Create region-scoped variables file
        shell: bash
        run: |
          set -euo pipefail

          REGION="${{ matrix.region }}"
          echo "Deploying region: ${REGION}"

          jq --arg r "${REGION}" '
            .regions = { ($r): .regions[$r] }
          ' "${{ github.workspace }}/input.json" > "${{ github.workspace }}/region.json"

      #####################################################################
      # Terraform init/plan/apply in TF_DIR
      #####################################################################
      - name: Terraform Init (per region state)
        shell: bash
        run: |
          set -euo pipefail

          TFROOT="${{ github.workspace }}/${{ env.TF_DIR }}"
          if [ ! -d "${TFROOT}" ]; then
            echo "ERROR: TF folder not found: ${TFROOT}"
            echo "Expected: infrastructure/azure-functions-resiliency/linux"
            exit 1
          fi

          REGION="${{ matrix.region }}"

          ENVIRONMENT="$(jq -r '.environment' "${{ github.workspace }}/region.json")"
          APPCODE="$(jq -r '.appcode' "${{ github.workspace }}/region.json")"
          APPNAME="$(jq -r '.appname' "${{ github.workspace }}/region.json")"
          FUNCNAME="$(jq -r --arg r "${REGION}" '.regions[$r].function_app_name' "${{ github.workspace }}/region.json")"

          # Move region payload + backend + optional secrets into TF folder
          mv "${{ github.workspace }}/region.json" "${TFROOT}/variables.auto.tfvars.json"
          cp "${{ github.workspace }}/backend_${ENVIRONMENT}.json" "${TFROOT}/backend.json"

          # Only copy secrets if file is non-empty (optional)
          if [ -s "${{ github.workspace }}/secrets.auto.tfvars_${ENVIRONMENT}.json" ]; then
            cp "${{ github.workspace }}/secrets.auto.tfvars_${ENVIRONMENT}.json" "${TFROOT}/secrets.auto.tfvars.json"
          fi

          cd "${TFROOT}"

          # 1 state file per function app per region
          TERRAFORM_STATE_KEY="esfn/${ENVIRONMENT}/${APPCODE}/${APPNAME}/azfnapp/${REGION}/${FUNCNAME}/terraform.tfstate"
          echo "STATE_KEY=${TERRAFORM_STATE_KEY}"

          terraform init -input=false \
            -backend-config="backend.json" \
            -backend-config="key=${TERRAFORM_STATE_KEY}"

      - name: Terraform Validate
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/${{ env.TF_DIR }}"
          terraform validate

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/${{ env.TF_DIR }}"
          terraform plan -input=false -out=tfplan | tee tf-file.plan

      - name: Terraform Apply
        if: ${{ github.event.inputs.do_apply == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/${{ env.TF_DIR }}"
          terraform apply -auto-approve -input=false tfplan
